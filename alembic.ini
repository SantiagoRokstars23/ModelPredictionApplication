# Modelo Santiago -- configuracion de Alembic (bootstrap oficial, BUILD-001)
# Estructura inicializada unicamente -- sin revisiones creadas todavia.
# Referencia: docs/34-Decision-Oficial-del-Stack-Tecnologico.md, seccion 6.
# La URL real de conexion se resuelve en tiempo de ejecucion desde la variable
# de entorno DATABASE_URL (ver migrations/env.py) -- nunca se fija aqui en texto plano.

[alembic]
script_location = migrations
prepend_sys_path = .
version_path_separator = os
sqlalchemy.url =

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
